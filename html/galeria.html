<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurassic Park - Galeria</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>

        :root {
            --cor-header: #050505;
            --cor-card: #121212;
            --cor-verde: #6B8E23;
            --cor-vermelho: #C0392B;
            --cor-texto: #F5F5F5;

            --fonte-titulo: 'Anton', sans-serif;
            --fonte-texto: 'Poppins', sans-serif;
        }
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: black;
        }

        header img {
            margin: 20px;
            width: 150px;
        }

        header i {
            background-color: #191818;
            color: var(--cor-verde);
            border-top: 0.5px solid  rgba(255, 255, 255, 0.151);
            box-shadow: 1px 1px rgba(255, 255, 255, 0.151);
            width: 100vw;
            text-align: center;
            padding: 5px;
            font-size: 30px;
        }

        header i:hover {
            cursor: pointer;
            background-color: #182204;
            color: var(--cor-verde);
        }

        nav {
            display: none;
        }

        nav ul li {
            background-color: #191818;
            width: 95vw;
            border: 1px solid black;
            border-radius: 5px;
            padding: 10px;
            margin: 5px;
            border: 1px solid #6B8E23;

            text-align: center;
        }

        nav ul li:hover {
            cursor: pointer;
            background-color: #182204;
        }

        nav a {
            text-decoration: none;
            color: white;
        }

        main {
            min-height: 100vh;
            background-color: #121212;
        }

        .banner-galeria {
            background-image: url('../img/imagem-fundo.png');
            min-height: 200px;
            background-size: cover;
            background-position: center;
        }

    </style>
</head>
<body>
    <header>
        <img src="../img/logo.png" alt="">
        <i class="bi bi-list" onclick="clickMenu()"></i>
        <nav id="menu">
            <ul id="nav-bar">
                <li ><a href="../index.html" class="nav-item">Menu Inicial</a></li>
                <li ><a href="./linhadotempo.html" class="nav-item">Linha do tempo</a></li>
                <li ><a href="./html/did.html"class="nav-item">"Did you know?"</a></li>
                <li ><a href="./iconicos.html"class="nav-item">Dinossauros Iconicos</a></li>
                <li ><a href="./sobre.html" class="nav-item">Sobre nós</a></li>
                <li ><a href="./sugestoes.html"class="nav-item">Sugestões</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="banner-galeria">
            <h1>GALERIA</h1>
        </section>

        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        <article class="galeria-card"></article>
        
    </main>
    <footer>
    </footer>
    <script>
        function clickMenu() {
            if (menu.style.display == 'block') {
                menu.style.display = 'none'
            }
            else {
                menu.style.display = 'block'
            }
        }
    </script>
</body>
</html>
